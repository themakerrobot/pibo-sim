<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIBO Physics Sim</title>
<style>
:root{--bg:#E9EBED;--panel:#F7F8F9;--panel2:#fff;--line:#C9CED4;--ink:#1C2530;--ink3:#8B95A1;--acc:#E8590C;--ok:#2F7D4F;--mono:ui-monospace,monospace;--sans:'Segoe UI',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:13px}
header{background:var(--panel2);border-bottom:1px solid var(--line);padding:0 16px;display:flex;align-items:center;gap:14px;height:46px;flex-shrink:0}
header h1{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.badge{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.badge.ok{color:var(--ok)}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.left{width:210px;background:var(--panel);border-right:1px solid var(--line);padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex-shrink:0}
.sec-title{font-size:9.5px;text-transform:uppercase;color:var(--ink3);letter-spacing:.14em;margin:6px 0 2px}
button{padding:7px 9px;background:var(--ink);color:#fff;border:none;border-radius:3px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:var(--sans)}
button:hover{background:var(--acc)}
button.sec{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
button.sec:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
button.on{background:var(--acc);color:#fff}
input[type=file]{display:none}
.row{display:flex;gap:6px}
.row button{flex:1}
.viewport{flex:1;position:relative;overflow:hidden;background:#DFE2E5}
canvas{display:block;width:100%!important;height:100%!important}
.hud{position:absolute;bottom:10px;left:12px;font-size:10px;color:var(--ink3);font-family:var(--mono);line-height:1.7;pointer-events:none}
.right{width:240px;background:var(--panel);border-left:1px solid var(--line);padding:10px;overflow-y:auto;flex-shrink:0}
.sl{margin-bottom:7px}
.sl-head{display:flex;justify-content:space-between;font-size:10.5px;font-family:var(--mono);margin-bottom:2px}
.sl-head b{color:var(--ink)}.sl-head span{color:var(--acc)}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;background:var(--line);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:#fff;border:2px solid var(--ink);border-radius:50%}
.note{font-size:10px;color:var(--ink3);line-height:1.6;margin-top:6px}
.ov{position:absolute;inset:0;background:#E9EBEDcc;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink)}
</style>
</head>
<body>
<header>
  <h1>PIBO Physics</h1>
  <span class="badge" id="badge">초기화 중...</span>
</header>
<div class="main">
  <div class="left">
    <div class="sec-title">시뮬</div>
    <div class="row"><button id="playBtn">▶ 재생</button><button class="sec" id="resetBtn">↺ 리셋</button></div>
    <button class="sec on" id="gravBtn">중력 ON</button>
    <div class="sec-title">모션</div>
    <button class="sec" id="loadMotionBtn">📂 모션 불러오기</button>
    <input type="file" id="motionFile" accept=".json">
    <button class="sec" id="zeroBtn">기본자세(0)</button>
    <div class="sec-title">데이터</div>
    <button class="sec" id="reloadBtn">data/ 다시 로드</button>
    <input type="file" id="urdfFile" accept=".urdf">
    <input type="file" id="stlFiles" accept=".stl" multiple>
    <button class="sec" id="manualBtn">파일 직접 선택</button>
    <div class="note">슬라이더로 모터 목표각을 주거나 모션을 재생 → 중력 하에서 균형/넘어짐 확인. 결과는 정성적(참고용).</div>
    <div id="info" class="note"></div>
  </div>
  <div class="viewport" id="vp">
    <canvas id="cv"></canvas>
    <div class="hud"><span id="fps">FPS:--</span><br>좌클릭 회전 · 우클릭 이동 · 휠 줌</div>
    <div class="ov" id="ov">Rapier 물리엔진 로딩 중...</div>
  </div>
  <div class="right" id="sliders"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
import RAPIER from 'https://esm.sh/@dimforge/rapier3d-compat@0.12.2';

// ───────── 설정 ─────────
const DATA_DIR='data/', URDF_NAMES=['pibo.urdf'];
const DENSITY=140;          // 셸 밀도(kg/m³) — 전체 질량 튜닝
const MOTOR_STIFF=18, MOTOR_DAMP=2.2;   // 서보 강성/감쇠
const GROUND_FRICTION=1.1;
// 모터 M0..M9 → joint + 부호 + 슬라이더 0일때 오프셋(rad)
const PIBO_MAP=[
 {j:'ankle_r_joint', s:1, off:0},   {j:'hip_r_joint', s:1, off:0},
 {j:'shoulder_r_joint', s:1, off: Math.PI/2}, {j:'elbow_r_joint', s:1, off:0},
 {j:'head_pan_joint', s:1, off:0},  {j:'head_tilt_joint', s:1, off:0},
 {j:'ankle_l_joint', s:1, off:0},   {j:'hip_l_joint', s:1, off:0},
 {j:'shoulder_l_joint', s:1, off:-Math.PI/2}, {j:'elbow_l_joint', s:1, off:0},
];
const LABEL=['M0 R-Foot','M1 R-Leg','M2 R-Arm','M3 R-Hand','M4 Head Pan','M5 Head Tilt','M6 L-Foot','M7 L-Leg','M8 L-Arm','M9 L-Hand'];
const RANGE=[25,35,80,30,50,25,25,35,80,30];
const DEG=Math.PI/180;

// ───────── three.js ─────────
const cv=document.getElementById('cv'),vp=document.getElementById('vp');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setClearColor(0xDFE2E5);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,1,.01,200);
scene.add(new THREE.AmbientLight(0xffffff,.5));
const dl=new THREE.DirectionalLight(0xffffff,.85);dl.position.set(4,8,5);scene.add(dl);
const grid=new THREE.GridHelper(6,24,0xB8BEC5,0xCDD2D7);scene.add(grid);
// 바닥판 시각
const gp=new THREE.Mesh(new THREE.PlaneGeometry(6,6),new THREE.MeshPhongMaterial({color:0xe4e7ea}));
gp.rotation.x=-Math.PI/2;gp.position.y=-0.001;scene.add(gp);
// z-up(물리) → y-up(표시) 컨테이너
const cont=new THREE.Group();cont.rotation.x=-Math.PI/2;scene.add(cont);

// 간단 오빗
let phi=1.15,theta=0.6,rad=1.6,tgt=new THREE.Vector3(0,0.18,0),dn=false,btn=0,lx=0,ly=0;
function cam(){const s=Math.sin(phi);camera.position.set(tgt.x+rad*s*Math.sin(theta),tgt.y+rad*Math.cos(phi),tgt.z+rad*s*Math.cos(theta));camera.lookAt(tgt);}
cv.addEventListener('mousedown',e=>{dn=true;btn=e.button;lx=e.clientX;ly=e.clientY;});
addEventListener('mousemove',e=>{if(!dn)return;const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;if(btn===0){theta-=dx*.006;phi=Math.max(.05,Math.min(Math.PI-.05,phi-dy*.006));}else{const f=rad*.0015;tgt.x-=Math.cos(theta)*dx*f;tgt.z+=Math.sin(theta)*dx*f;tgt.y+=dy*f;}cam();});
addEventListener('mouseup',()=>dn=false);
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('wheel',e=>{e.preventDefault();rad=Math.max(.4,Math.min(8,rad*(e.deltaY>0?1.1:.9)));cam();},{passive:false});
function resize(){const w=vp.clientWidth,h=vp.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
resize();new ResizeObserver(resize).observe(vp);cam();

// ───────── 파서 ─────────
function parseSTL(buf){const dv=new DataView(buf);const n=dv.getUint32(80,true);
  if(Math.abs(buf.byteLength-(84+n*50))>4){return parseAscii(new TextDecoder().decode(buf));}
  const pos=new Float32Array(n*9);let o=84;
  for(let i=0;i<n;i++){o+=12;for(let j=0;j<3;j++){const b=i*9+j*3;pos[b]=dv.getFloat32(o,true);pos[b+1]=dv.getFloat32(o+4,true);pos[b+2]=dv.getFloat32(o+8,true);o+=12;}o+=2;}
  return pos;}
function parseAscii(t){const p=[];for(const ln of t.split('\n')){const m=ln.trim().match(/vertex\s+(\S+)\s+(\S+)\s+(\S+)/);if(m)p.push(+m[1],+m[2],+m[3]);}return new Float32Array(p);}
function parseURDF(xml){const doc=new DOMParser().parseFromString(xml,'text/xml');
  const mats={};doc.querySelectorAll('robot>material').forEach(m=>{const c=m.querySelector('color');if(c&&m.getAttribute('name'))mats[m.getAttribute('name')]=(c.getAttribute('rgba')||'').split(/\s+/).map(Number);});
  const links={},joints={};
  doc.querySelectorAll('link').forEach(el=>{const n=el.getAttribute('name');const vis=[];
    el.querySelectorAll('visual').forEach(v=>{const me=v.querySelector('geometry mesh');if(!me)return;
      const mm=v.querySelector('material');let rgba=null;if(mm){const c=mm.querySelector('color');rgba=c?(c.getAttribute('rgba')||'').split(/\s+/).map(Number):(mats[mm.getAttribute('name')]||null);}
      vis.push({fn:me.getAttribute('filename')||'',sc:(me.getAttribute('scale')||'1 1 1').split(/\s+/).map(Number),o:orig(v.querySelector('origin')),rgba});});
    links[n]={name:n,vis};});
  doc.querySelectorAll('joint').forEach(el=>{const n=el.getAttribute('name'),t=el.getAttribute('type')||'fixed';
    joints[n]={name:n,type:t,parent:el.querySelector('parent')?.getAttribute('link'),child:el.querySelector('child')?.getAttribute('link'),
      o:orig(el.querySelector('origin')),axis:(el.querySelector('axis')?.getAttribute('xyz')||'0 0 1').split(/\s+/).map(Number),
      lim:(()=>{const l=el.querySelector('limit');return{lo:l?+l.getAttribute('lower'):-3.14,hi:l?+l.getAttribute('upper'):3.14};})()};});
  return{links,joints};}
function orig(el){if(!el)return{xyz:[0,0,0],rpy:[0,0,0]};return{xyz:(el.getAttribute('xyz')||'0 0 0').split(/\s+/).map(Number),rpy:(el.getAttribute('rpy')||'0 0 0').split(/\s+/).map(Number)};}
const base=s=>s.split(/[/\\]/).pop().toLowerCase();

// rpy→quaternion / 행렬 헬퍼 (three 사용)
function originMat(o){const m=new THREE.Matrix4();const e=new THREE.Euler(o.rpy[0],o.rpy[1],o.rpy[2],'XYZ');m.makeRotationFromEuler(e);m.setPosition(o.xyz[0],o.xyz[1],o.xyz[2]);return m;}

// ───────── 상태 ─────────
let world=null, RAPIER_READY=false, robot=null, motion=null, playing=false, gravityOn=true;
let urdfTxt=null, stlMap={}, target={}; // jointName -> target angle(rad)
const clock={last:performance.now(),fps:0,t:performance.now()};

await RAPIER.init();RAPIER_READY=true;document.getElementById('ov').style.display='none';
document.getElementById('badge').textContent='Rapier 준비';

// ───────── data/ 로드 ─────────
async function fetchData(){
  let txt=null,nm=null;
  for(const n of URDF_NAMES){try{const r=await fetch(DATA_DIR+n);if(r.ok){txt=await r.text();nm=n;break;}}catch(e){}}
  if(!txt){document.getElementById('badge').textContent='data/ URDF 없음';return false;}
  const{links}=parseURDF(txt);const names=new Set();
  for(const l of Object.values(links))for(const v of l.vis){const b=base(v.fn);if(b)names.add(b);}
  const map={};for(const n of names){try{const r=await fetch(DATA_DIR+n);if(r.ok)map[n]=parseSTL(await r.arrayBuffer());}catch(e){}}
  urdfTxt=txt;stlMap=map;return true;
}

// ───────── 빌드 ─────────
function clearScene(){if(robot){for(const l of Object.values(robot.links))cont.remove(l.grp);}robot=null;}
function buildRobot(){
  clearScene();
  if(world)world.free();
  world=new RAPIER.World({x:0,y:0,z:gravityOn?-9.81:0});
  // 바닥 (z=0 평면)
  const gb=world.createRigidBody(RAPIER.RigidBodyDesc.fixed());
  world.createCollider(RAPIER.ColliderDesc.cuboid(3,3,0.05).setTranslation(0,0,-0.05).setFriction(GROUND_FRICTION),gb);

  const{links,joints}=parseURDF(urdfTxt);
  // FK 월드 rest 변환
  const childOf={};for(const j of Object.values(joints))childOf[j.child]=j;
  const rootName=Object.keys(links).find(n=>!childOf[n])||Object.keys(links)[0];
  const worldMat={};
  function fk(name,parentMat){const j=childOf[name];const m=parentMat.clone();if(j)m.multiply(originMat(j.o));worldMat[name]=m;
    for(const jj of Object.values(joints))if(jj.parent===name)fk(jj.child,m);}
  fk(rootName,new THREE.Matrix4());

  const bodies={}, linkObjs={};
  // 바닥에 닿게 살짝 띄움: 최저 z 계산
  let minZ=Infinity;
  for(const[ln,m] of Object.entries(worldMat)){const lk=links[ln];for(const v of lk.vis){const pts=stlMap[base(v.fn)];if(!pts)continue;
    const om=m.clone().multiply(originMat(v.o));const sc=v.sc[0];
    for(let i=0;i<pts.length;i+=3){const p=new THREE.Vector3(pts[i]*sc,pts[i+1]*sc,pts[i+2]*sc).applyMatrix4(om);if(p.z<minZ)minZ=p.z;}}}
  const lift=(isFinite(minZ)?-minZ:0)+0.003;

  for(const[ln,m] of Object.entries(worldMat)){
    const pos=new THREE.Vector3(),quat=new THREE.Quaternion(),scl=new THREE.Vector3();
    m.decompose(pos,quat,scl);
    const body=world.createRigidBody(RAPIER.RigidBodyDesc.dynamic().setTranslation(pos.x,pos.y,pos.z+lift).setRotation({x:quat.x,y:quat.y,z:quat.z,w:quat.w}).setLinearDamping(0.2).setAngularDamping(0.4));
    bodies[ln]=body;
    // 충돌체: 첫 visual(셸) convex hull
    const lk=links[ln];const shell=lk.vis[0];
    if(shell&&stlMap[base(shell.fn)]){const pts=stlMap[base(shell.fn)];const sc=shell.sc[0];
      const om=originMat(shell.o);const arr=new Float32Array(pts.length);
      for(let i=0;i<pts.length;i+=3){const p=new THREE.Vector3(pts[i]*sc,pts[i+1]*sc,pts[i+2]*sc).applyMatrix4(om);arr[i]=p.x;arr[i+1]=p.y;arr[i+2]=p.z;}
      let cd=RAPIER.ColliderDesc.convexHull(arr);
      if(cd){cd.setDensity(DENSITY).setFriction(ln.includes('foot')?GROUND_FRICTION:0.6);world.createCollider(cd,body);}
    }
    // 시각: 모든 visual
    const grp=new THREE.Group();
    for(const v of lk.vis){const pts=stlMap[base(v.fn)];if(!pts)continue;
      const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pts.slice(),3));g.computeVertexNormals();
      const col=v.rgba?new THREE.Color(v.rgba[0],v.rgba[1],v.rgba[2]):new THREE.Color(0xeeeeee);
      const mesh=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:col,shininess:25}));
      mesh.position.set(...v.o.xyz);mesh.setRotationFromEuler(new THREE.Euler(...v.o.rpy,'XYZ'));mesh.scale.set(...v.sc);
      grp.add(mesh);}
    cont.add(grp);linkObjs[ln]={grp,body};
  }
  // 관절 + 모터
  const jmap={};
  for(const j of Object.values(joints)){
    const pb=bodies[j.parent],cb=bodies[j.child];if(!pb||!cb)continue;
    const Twp=worldMat[j.parent],Twc=worldMat[j.child];
    const jp=new THREE.Vector3(Twc.elements[12],Twc.elements[13],Twc.elements[14]); // 자식 원점=관절위치
    const a1=jp.clone().applyMatrix4(new THREE.Matrix4().copy(Twp).invert());
    const a2=new THREE.Vector3(0,0,0);
    // 축: 부모 로컬로
    const axW=new THREE.Vector3(...j.axis).applyMatrix4(new THREE.Matrix4().extractRotation(Twc)).normalize();
    const axP=axW.clone().applyMatrix4(new THREE.Matrix4().extractRotation(Twp).invert()).normalize();
    if(j.type==='fixed'){
      const jd=RAPIER.JointData.fixed({x:a1.x,y:a1.y,z:a1.z},{x:0,y:0,z:0,w:1},{x:0,y:0,z:0},{x:0,y:0,z:0,w:1});
      world.createImpulseJoint(jd,pb,cb,true);continue;
    }
    const jd=RAPIER.JointData.revolute({x:a1.x,y:a1.y,z:a1.z},{x:a2.x,y:a2.y,z:a2.z},{x:axP.x,y:axP.y,z:axP.z});
    if(j.lim){jd.limitsEnabled=true;jd.limits=[j.lim.lo,j.lim.hi];}
    const joint=world.createImpulseJoint(jd,pb,cb,true);
    try{joint.configureMotorModel(RAPIER.MotorModel.AccelerationBased);}catch(e){}
    jmap[j.name]=joint;
  }
  robot={links:linkObjs,bodies,joints,jmap,rootName};
  // 목표각 0
  for(const j of Object.values(joints))if(j.type!=='fixed')target[j.name]=0;
  applyTargets();
  document.getElementById('badge').textContent='로드 완료';document.getElementById('badge').className='badge ok';
  document.getElementById('info').textContent=`링크 ${Object.keys(linkObjs).length} · 관절 ${Object.keys(jmap).length} · 질량≈${world.bodies.getAll().reduce((a,b)=>a+(b.mass?b.mass():0),0).toFixed(2)}kg`;
  buildSliders(joints);
}

function applyTargets(){
  if(!robot)return;
  for(const[jn,joint] of Object.entries(robot.jmap)){
    const t=target[jn]||0;
    try{joint.configureMotorPosition(t,MOTOR_STIFF,MOTOR_DAMP);}catch(e){}
  }
}

// 모터값(M0..9, deg) → 관절 목표각
function setMotors(vals){
  for(let i=0;i<10;i++){const m=PIBO_MAP[i];if(!robot.jmap[m.j])continue;
    target[m.j]=m.s*(vals[i]||0)*DEG+m.off;}
  applyTargets();
}

// ───────── 슬라이더 ─────────
function buildSliders(joints){
  const el=document.getElementById('sliders');el.innerHTML='<div class="sec-title">모터 목표각</div>';
  for(let i=0;i<10;i++){const m=PIBO_MAP[i];if(!joints[m.j])continue;
    const d=document.createElement('div');d.className='sl';
    d.innerHTML=`<div class="sl-head"><b>${LABEL[i]}</b><span id="sv${i}">0°</span></div><input type="range" id="sr${i}" min="-${RANGE[i]}" max="${RANGE[i]}" step="1" value="0">`;
    el.appendChild(d);
    d.querySelector('input').addEventListener('input',e=>{
      document.getElementById('sv'+i).textContent=e.target.value+'°';
      const m2=PIBO_MAP[i];target[m2.j]=m2.s*(+e.target.value)*DEG+m2.off;applyTargets();
    });
  }
}
function slidersFrom(vals){for(let i=0;i<10;i++){const sr=document.getElementById('sr'+i);if(sr){sr.value=vals[i]||0;document.getElementById('sv'+i).textContent=(vals[i]||0)+'°';}}}

// ───────── 모션 재생 ─────────
let motSeq=null,motT=0;
function loadMotion(obj){
  const key=Object.keys(obj)[0];const m=obj[key]||{};
  const init=m.init||Array(10).fill(0);const pos=m.pos||[];
  const frames=[{d:init.slice(),seq:0}];
  const last=init.slice();
  for(const fr of pos){const d=(fr.d||[]).map((v,i)=>v===999?last[i]:v);d.forEach((v,i)=>last[i]=v);frames.push({d,seq:fr.seq||0});}
  motSeq=frames;motT=0;
  document.getElementById('badge').textContent=`모션 "${key}" (${frames.length}프레임)`;
}
function motionAt(ms){
  if(!motSeq)return null;
  if(ms<=motSeq[0].seq)return motSeq[0].d;
  if(ms>=motSeq[motSeq.length-1].seq)return motSeq[motSeq.length-1].d;
  for(let i=0;i<motSeq.length-1;i++){const a=motSeq[i],b=motSeq[i+1];
    if(ms>=a.seq&&ms<=b.seq){const t=(ms-a.seq)/(b.seq-a.seq||1);return a.d.map((v,k)=>v+(b.d[k]-v)*t);}}
  return motSeq[motSeq.length-1].d;
}

// ───────── 루프 ─────────
function step(now){
  requestAnimationFrame(step);
  const dt=Math.min((now-clock.last)/1000,0.033);clock.last=now;
  if(world){
    if(playing&&motSeq){motT+=dt*1000;const v=motionAt(motT);if(v){setMotors(v);slidersFrom(v.map(x=>Math.round(x)));}
      if(motT>=motSeq[motSeq.length-1].seq){playing=false;document.getElementById('playBtn').textContent='▶ 재생';}}
    world.step();
    if(robot)for(const[ln,o] of Object.entries(robot.links)){const t=o.body.translation(),r=o.body.rotation();
      o.grp.position.set(t.x,t.y,t.z);o.grp.quaternion.set(r.x,r.y,r.z,r.w);}
  }
  renderer.render(scene,camera);
  clock.fps++;if(now-clock.t>=1000){document.getElementById('fps').textContent='FPS:'+clock.fps;clock.fps=0;clock.t=now;}
}
requestAnimationFrame(step);

// ───────── UI ─────────
document.getElementById('playBtn').onclick=function(){if(!motSeq){alert('모션을 먼저 불러오세요');return;}playing=!playing;this.textContent=playing?'⏸ 정지':'▶ 재생';if(playing&&motT>=(motSeq[motSeq.length-1].seq))motT=0;};
document.getElementById('resetBtn').onclick=()=>{playing=false;document.getElementById('playBtn').textContent='▶ 재생';motT=0;buildRobot();slidersFrom(Array(10).fill(0));};
document.getElementById('gravBtn').onclick=function(){gravityOn=!gravityOn;this.textContent='중력 '+(gravityOn?'ON':'OFF');this.classList.toggle('on',gravityOn);if(world)world.gravity={x:0,y:0,z:gravityOn?-9.81:0};};
document.getElementById('zeroBtn').onclick=()=>{playing=false;document.getElementById('playBtn').textContent='▶ 재생';setMotors(Array(10).fill(0));slidersFrom(Array(10).fill(0));};
document.getElementById('loadMotionBtn').onclick=()=>document.getElementById('motionFile').click();
document.getElementById('motionFile').onchange=async e=>{const f=e.target.files[0];if(!f)return;loadMotion(JSON.parse(await f.text()));e.target.value='';};
document.getElementById('reloadBtn').onclick=async()=>{document.getElementById('badge').textContent='로딩...';if(await fetchData())buildRobot();};
document.getElementById('manualBtn').onclick=()=>document.getElementById('urdfFile').click();
document.getElementById('urdfFile').onchange=async e=>{const f=e.target.files[0];if(f)urdfTxt=await f.text();document.getElementById('stlFiles').click();};
document.getElementById('stlFiles').onchange=async e=>{for(const f of e.target.files)stlMap[f.name.toLowerCase()]=parseSTL(await f.arrayBuffer());if(urdfTxt)buildRobot();e.target.value='';};

// 자동 로드
if(await fetchData())buildRobot();
</script>
</body>
</html>
